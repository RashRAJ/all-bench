defaults:
  model: mistralai/Mistral-7B-Instruct-v0.3
  output_tokens: 128

runners:
   - aiperf
  # - vlmbench

aiperf:
  url: https://3mca5ih1iy239p-8000.proxy.runpod.net/              #localhost:8000
  endpoint_type: chat
  endpoint: /v1/chat/completions
  streaming: true
  request_rate: 35
  request_count: 70

vlmbench:
  url: http://localhost:8000/v1
  dataset: hf://vlm-run/FineVision-vlmbench-mini
  dataset_text_col: prompt
  prompt: "Explain GPU observability in 3 sentences."
  concurrency: "2,4,8"
  max_samples: 64

output:
  format: table
  file: results.json
